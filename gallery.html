<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | AL PARVEZ GIRLS DEGREE COLLEGE</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

.gallery-section{
    width:90%;
    max-width:1200px;
    margin:50px auto;
}

.gallery-title{
    text-align:center;
    color:#7a1020;
    font-size:40px;
    margin-bottom:10px;
}

.gallery-sub{
    text-align:center;
    color:#666;
    margin-bottom:40px;
}

.gallery-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:20px;

}

.gallery-item{

overflow:hidden;

border-radius:12px;

background:white;

box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.gallery-item img{

width:100%;

height:250px;

object-fit:cover;

transition:.4s;

cursor:pointer;

}

.gallery-item:hover img{

transform:scale(1.08);

}

.lightbox{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.9);

justify-content:center;

align-items:center;

z-index:999;

}

.lightbox img{

max-width:90%;

max-height:90%;

border-radius:10px;

}

.lightbox span{

position:absolute;

top:20px;

right:40px;

font-size:45px;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<section class="gallery-section">

<h1 class="gallery-title">College Gallery</h1>

<p class="gallery-sub">
Campus • Events • Students • Activities
</p>

<div class="gallery-grid">

<div class="gallery-item">
<img src="images/gallery/gallery1.jpg" onclick="openImage(this.src)">
</div>

<div class="gallery-item">
<img src="images/gallery/gallery2.jpg" onclick="openImage(this.src)">
</div>

<div class="gallery-item">
<img src="images/gallery/gallery3.jpg" onclick="openImage(this.src)">
</div>

<div class="gallery-item">
<img src="images/gallery/gallery4.jpg" onclick="openImage(this.src)">
</div>

<div class="gallery-item">
<img src="images/gallery/gallery5.jpg" onclick="openImage(this.src)">
</div>

<div class="gallery-item">
<img src="images/gallery/gallery6.jpg" onclick="openImage(this.src)">
</div>

<div class="gallery-item">
<img src="images/gallery/gallery7.jpg" onclick="openImage(this.src)">
</div>

<div class="gallery-item">
<img src="images/gallery/gallery8.jpg" onclick="openImage(this.src)">
</div>

</div>

</section>

<div class="lightbox" id="lightbox">

<span onclick="closeImage()">&times;</span>

<img id="preview">

</div>

<script>

function openImage(src){

document.getElementById("lightbox").style.display="flex";

document.getElementById("preview").src=src;

}

function closeImage(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
